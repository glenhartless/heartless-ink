<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Glen Hartless</title>
<meta name="description" content="Portfolio of illustrative realism and black & grey tattoo work by Glen Hartless.">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #0c0c0e;
  --text: #f2f1ee;
  --accent: #6e0f17;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
}

a{ color: var(--accent); text-decoration:none; }

.back{
  position:fixed;
  top:22px;
  left:8%;
  z-index:20;
  font-size:0.9rem;
  letter-spacing:1px;
}

header{
  padding:140px 8% 60px 8%;
}

h1{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(3rem, 6vw, 5rem);
  letter-spacing:0.12em;
  margin:0 0 18px 0;
}

.subtitle{
  opacity:0.7;
  letter-spacing:4px;
  text-transform:uppercase;
  font-size:0.9rem;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:22px;
  padding:0 8% 120px 8%;
}

.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
}

.card img{
  width:100%;
  height:520px;
  object-fit:cover;
  display:block;
  transition:transform 0.35s ease, filter 0.35s ease;
}

.card:hover img{
  transform:scale(1.03);
  filter:contrast(1.05);
}

/* Lightbox */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.88);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:24px;
}

.lightbox.open{ display:flex; }

.lightbox img{
  max-width:min(1100px, 96vw);
  max-height:92vh;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.10);
}

.lightbox .close{
  position:absolute;
  top:18px;
  right:18px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  border-radius:999px;
  padding:10px 14px;
  font-size:0.85rem;
  letter-spacing:0.08em;
  cursor:pointer;
}

@media (max-width:1100px){
  .gallery{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
  .card img{ height:440px; }
}

@media (max-width:600px){
  .gallery{ grid-template-columns:1fr; padding:0 7% 100px 7%; }
  .card img{ height:380px; }
  .back{ left:16px; }
  header{ padding:120px 7% 40px 7%; }
}

footer{
  text-align:center;
  padding:60px 20px;
  border-top:1px solid var(--accent);
  font-size:0.8rem;
  letter-spacing:1px;
  opacity:0.9;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Back to Home</a>

<header>
  <h1>PORTFOLIO</h1>
  <div class="subtitle">Illustrative Realism • Black & Grey</div>
</header>

<section class="gallery" id="gallery"></section>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="close" id="closeLightbox" type="button">CLOSE</button>
  <img id="lightboxImg" src="" alt="">
</div>

<footer>
  © 2026 Glen Hartless
</footer>

<script>
  // Put ALL your images in the SAME folder as work.html (same level).
  // These filenames must match EXACTLY (capitalization, dashes, etc).
  const images = [
    "portrait-realism-sleeve.webp",
    "cross-forearm-black-grey.webp",
    "rib-ornamental-linework.webp",

    
    "black-grey-sleeve-realism.webp",

    "cowboy-skull-forearm.webp",
    "skull-shotglass-forearm.webp",

   
    "compass-forearm-black-grey.webp",
    "ornamental-leg-sleeve-black-work.webp",
    "rose-hand-tattoo.webp",
    "ornamental-leg-sleeve.webp",
    "ship-realism-sleeve.webp",
    "portrait-face-leg-realism.webp",
    "black-grey-forearm-wrap.webp",
    "neck-tattoo-black-grey.webp",
    "biomechanical-arm-sleeve.webp",
    "rose-hand-black-grey.webp",
    "horses-colour-thigh.webp",
    "money-realism-forearm.webp",
    "skeleton-forearm-black-grey.webp",
    "colour-arm-sleeve.webp",
    "neck-back-piece-black-grey.webp",
    "skull-neck-tattoo.webp",

   
    "black-grey-arm-sleeve.webp",

    "tiger-forearm-black-grey.webp",
    "lion-realism-forearm.webp",
    "hands-skull-forearm.webp",
    "black-grey-realism-guy-fakwkes-skull-leg-tattoo.webp"
  ];

  const gallery = document.getElementById("gallery");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const closeBtn = document.getElementById("closeLightbox");

  function prettyTitle(filename){
    return filename
      .replace(/\.[^/.]+$/, "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  images.forEach((src) => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.src = src;
    img.alt = prettyTitle(src);
    img.loading = "lazy";

    card.appendChild(img);
    card.addEventListener("click", () => {
      lightboxImg.src = src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    });

    gallery.appendChild(card);
  });

  function closeLightbox(){
    lightbox.classList.remove("open");
    lightbox.setAttribute("aria-hidden", "true");
    lightboxImg.src = "";
    document.body.style.overflow = "";
  }

  closeBtn.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });
</script>

</body>
</html>
